<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warehouse Price Comparator</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --bg2: #f5f4f0;
      --bg3: #eeede9;
      --text: #1a1a18;
      --text2: #5a5955;
      --text3: #9c9a92;
      --border: rgba(0, 0, 0, 0.10);
      --border2: rgba(0, 0, 0, 0.20);
      --r: 10px;
      --rl: 14px;
      --font: system-ui, -apple-system, sans-serif;
      --mono: ui-monospace, monospace;
      --costco: #0034A5;
      --sams: #004B91;
      --green: #3a9e5f;
      --amber: #c4910a;
      --red: #b53a2f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg2: #232320;
        --bg3: #2b2b28;
        --text: #e8e6df;
        --text2: #a8a69e;
        --text3: #6e6c65;
        --border: rgba(255, 255, 255, 0.08);
        --border2: rgba(255, 255, 255, 0.18);
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -.02em;
    }

    .logo span {
      color: var(--text2);
      font-weight: 400;
    }

    .sbadge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .sb-c {
      background: #0034A5;
      color: #fff;
    }

    .sb-s {
      background: #004B91;
      color: #fff;
    }

    .status-row {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
      padding: 5px 10px;
      border-radius: 20px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-g {
      background: var(--green);
    }

    .dot-a {
      background: var(--amber);
    }

    .dot-r {
      background: var(--red);
    }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 22px 18px;
    }

    .store-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .store-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .store-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 3px;
      flex-shrink: 0;
    }

    .sc-costco {
      background: #0034A5;
    }

    .sc-sams {
      background: #004B91;
    }

    .store-card .name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .store-card .addr {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }

    .store-card .note {
      font-size: 11px;
      color: var(--green);
      margin-top: 3px;
      font-style: italic;
    }

    .store-card .note-warn {
      font-size: 11px;
      color: var(--amber);
      margin-top: 3px;
    }

    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--rl);
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    .tabs {
      display: flex;
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      width: fit-content;
      margin-bottom: 14px;
    }

    .tab {
      padding: 7px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: var(--font);
      transition: background .15s;
    }

    .tab:hover {
      background: var(--bg2);
    }

    .tab.active {
      background: var(--text);
      color: var(--bg);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 11px;
    }

    input[type=text],
    textarea {
      font-family: var(--font);
      font-size: 14px;
      padding: 9px 12px;
      background: var(--bg2);
      color: var(--text);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      outline: none;
      transition: border-color .15s;
    }

    input[type=text]:focus,
    textarea:focus {
      border-color: var(--border2);
    }

    input[type=text] {
      flex: 1;
    }

    textarea {
      width: 100%;
      height: 140px;
      resize: vertical;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 32px;
      margin-bottom: 11px;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--bg2);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
    }

    .chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 16px;
      line-height: 1;
      padding: 0 0 1px;
    }

    .chip button:hover {
      color: var(--text);
    }

    .empty-hint {
      font-size: 13px;
      color: var(--text3);
      align-self: center;
    }

    .hint {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 9px;
      line-height: 1.55;
    }

    .hint code {
      background: var(--bg2);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .parse-prev {
      font-size: 12px;
      color: var(--text2);
      margin-top: 7px;
    }

    .parse-prev em {
      background: var(--bg2);
      padding: 2px 6px;
      border-radius: 4px;
      font-style: normal;
      font-size: 11px;
      margin-right: 4px;
      border: 0.5px solid var(--border);
    }

    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 13px;
      padding-top: 13px;
      border-top: 0.5px solid var(--border);
    }

    .count {
      font-size: 13px;
      color: var(--text2);
      flex: 1;
    }

    button.btn {
      padding: 8px 18px;
      border-radius: var(--r);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 0.5px solid var(--border2);
      background: transparent;
      color: var(--text);
      font-family: var(--font);
      transition: background .15s, transform .1s;
    }

    button.btn:hover {
      background: var(--bg2);
    }

    button.btn:active {
      transform: scale(0.98);
    }

    button.btn.sm {
      padding: 6px 12px;
      font-size: 13px;
    }

    button.btn.primary {
      background: var(--text);
      color: var(--bg);
      border-color: transparent;
    }

    button.btn.primary:hover {
      opacity: 0.85;
    }

    button.btn.primary:disabled {
      opacity: 0.38;
      cursor: not-allowed;
      transform: none;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .metric {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--r);
      padding: 13px 15px;
    }

    .metric .lbl {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 3px;
    }

    .metric .val {
      font-size: 24px;
      font-weight: 600;
      line-height: 1;
    }

    .metric .sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 3px;
    }

    .tbl-wrap {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--rl);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .tbl-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      border-bottom: 0.5px solid var(--border);
    }

    .tbl-head span {
      font-size: 13px;
      color: var(--text2);
      font-weight: 500;
    }

    .data-tag {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .tag-live {
      background: rgba(58, 158, 95, .14);
      color: var(--green);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead {
      background: var(--bg2);
    }

    th {
      padding: 9px 13px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 0.5px solid var(--border);
      text-align: left;
    }

    th.r {
      text-align: right;
    }

    th.c {
      text-align: center;
    }

    td {
      padding: 11px 13px;
      font-size: 13px;
      border-bottom: 0.5px solid var(--border);
      vertical-align: top;
    }

    td.r {
      text-align: right;
    }

    td.c {
      text-align: center;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: var(--bg2);
    }

    .p-main {
      font-variant-numeric: tabular-nums;
    }

    .p-sub {
      font-size: 11px;
      color: var(--text3);
      display: block;
      margin-top: 2px;
    }

    .na-p {
      font-size: 12px;
      color: var(--text3);
      font-style: italic;
    }

    .wh-only {
      font-size: 10px;
      color: var(--green);
      display: block;
      margin-top: 1px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .pill-c {
      background: rgba(0, 52, 165, .1);
      color: var(--costco);
    }

    .pill-s {
      background: rgba(0, 75, 145, .1);
      color: var(--sams);
    }

    .pill-t {
      background: var(--bg2);
      color: var(--text2);
    }

    .pill-n {
      background: var(--bg2);
      color: var(--text3);
    }

    .col-item {
      width: 32%;
    }

    .col-store {
      width: 22%;
    }

    .col-saves {
      width: 12%;
    }

    .col-win {
      width: 12%;
    }

    .verdict {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--rl);
      padding: 16px 20px;
      margin-bottom: 12px;
    }

    .v-lbl {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 7px;
    }

    .v-txt {
      font-size: 15px;
      line-height: 1.65;
    }

    .loading {
      text-align: center;
      padding: 48px 20px;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--rl);
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading p {
      font-size: 14px;
      color: var(--text2);
      margin-top: 13px;
    }

    .loading .sub {
      font-size: 12px;
      color: var(--text3);
      margin-top: 4px;
    }

    .err {
      background: #fdf3f2;
      border: 0.5px solid #e8c5c2;
      border-radius: var(--rl);
      padding: 14px 17px;
      font-size: 14px;
      color: #b53a2f;
      line-height: 1.6;
    }

    .err code {
      background: rgba(0, 0, 0, .07);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: var(--mono);
      font-size: 12px;
    }

    @media (prefers-color-scheme:dark) {
      .err {
        background: #2a1a19;
        border-color: #5a2e2a;
        color: #e88a80;
      }
    }

    @media (max-width:560px) {
      .store-info {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: 1fr 1fr;
      }

      .summary-grid .metric:last-child {
        grid-column: span 2;
      }

      .col-saves {
        display: none;
      }
    }
  </style>
</head>

<body>

  <header>
    <span class="logo">Warehouse <span>price comparator</span></span>
    <span class="sbadge sb-c">Costco</span>
    <span class="sbadge sb-s">Sam's Club</span>
    <div class="status-row">
      <div class="status-pill">
        <div class="dot dot-a" id="sDot"></div>
        <span id="sTxt">Checking…</span>
      </div>
    </div>
  </header>

  <main>

    <!-- Store info cards (populated from /stores endpoint) -->
    <div class="store-info" id="storeInfo">
      <div class="store-card">
        <div class="store-dot sc-costco"></div>
        <div>
          <div class="name">Costco</div>
          <div class="addr" id="costcoAddr">Loading…</div>
          <div class="note" id="costcoNote"></div>
        </div>
      </div>
      <div class="store-card">
        <div class="store-dot sc-sams"></div>
        <div>
          <div class="name">Sam's Club</div>
          <div class="addr" id="samsAddr">Loading…</div>
          <div class="note-warn" id="samsNote"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('text',this)">Text list</button>
        <button class="tab" onclick="switchTab('table',this)">Paste table / CSV</button>
      </div>

      <div class="panel active" id="panel-text">
        <div class="input-row">
          <input type="text" id="itemInput" placeholder="Type an item and press Enter or Add…" />
          <button class="btn" onclick="addItem()">Add</button>
        </div>
        <div class="chips" id="chipsList">
          <span class="empty-hint">Add grocery items above — one at a time.</span>
        </div>
      </div>

      <div class="panel" id="panel-table">
        <p class="hint">Paste from Excel or Google Sheets, or type CSV. One item per row.<br>
          Formats: plain list · <code>Item, Qty</code> · <code>Item, Notes</code> — first column is used.</p>
        <textarea id="pasteArea"
          placeholder="olive oil&#10;chicken breast, 2 packs&#10;paper towels&#10;eggs, 18-count&#10;laundry detergent"
          oninput="parseTable()"></textarea>
        <div class="parse-prev" id="parsePrev"></div>
      </div>

      <div class="action-row">
        <span class="count" id="countLabel">No items yet</span>
        <button class="btn sm" onclick="clearAll()" id="clearBtn" style="display:none">Clear all</button>
        <button class="btn primary" id="compareBtn" onclick="comparePrices()" disabled>Compare prices →</button>
      </div>
    </div>

    <div id="results"></div>
  </main>

  <script>
    // Replace with your Railway backend URL in production
    const API = window.API_BASE || "https://warehouse-price-app-production.up.railway.app";

    let items = [], activeTab = "text";

    // ── Backend & store info ──────────────────────────────────────────────
    async function checkBackend() {
      try {
        const [h, s] = await Promise.all([
          fetch(`${API}/health`, { signal: AbortSignal.timeout(4000) }).then(r => r.json()),
          fetch(`${API}/stores`, { signal: AbortSignal.timeout(4000) }).then(r => r.json()),
        ]);

        document.getElementById("sDot").className = h.unwrangle_token ? "dot dot-g" : "dot dot-a";
        document.getElementById("sTxt").textContent = h.unwrangle_token ? "Live prices ready" : "Token missing";

        document.getElementById("costcoAddr").textContent = s.costco?.address ?? "";
        document.getElementById("costcoNote").textContent = `Warehouse #${s.costco?.warehouse_id} · true in-warehouse prices`;
        document.getElementById("samsAddr").textContent = s.samsclub?.address ?? "";
        document.getElementById("samsNote").textContent = `Club #${s.samsclub?.club_id} · online = in-club pricing`;
      } catch {
        document.getElementById("sDot").className = "dot dot-r";
        document.getElementById("sTxt").textContent = "Backend offline";
        document.getElementById("costcoAddr").textContent = "—";
        document.getElementById("samsAddr").textContent = "—";
      }
    }

    // ── Tabs ──────────────────────────────────────────────────────────────
    function switchTab(tab, el) {
      activeTab = tab;
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      el.classList.add("active");
      document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
      document.getElementById("panel-" + tab).classList.add("active");
      updateCount();
    }

    // ── Text panel ────────────────────────────────────────────────────────
    document.getElementById("itemInput").addEventListener("keydown", e => { if (e.key === "Enter") addItem(); });

    function addItem() {
      const v = document.getElementById("itemInput").value.trim();
      if (!v) return;
      const n = v.charAt(0).toUpperCase() + v.slice(1);
      if (!items.includes(n)) { items.push(n); renderChips(); }
      document.getElementById("itemInput").value = "";
      document.getElementById("itemInput").focus();
    }

    function removeItem(i) { items.splice(i, 1); renderChips(); }

    function renderChips() {
      const l = document.getElementById("chipsList");
      l.innerHTML = "";
      if (!items.length) {
        l.innerHTML = '<span class="empty-hint">Add grocery items above — one at a time.</span>';
      } else {
        items.forEach((it, i) => {
          const c = document.createElement("div"); c.className = "chip";
          c.innerHTML = `<span>${it}</span><button onclick="removeItem(${i})">×</button>`;
          l.appendChild(c);
        });
      }
      updateCount();
    }

    // ── CSV / table panel ─────────────────────────────────────────────────
    function parseTable() {
      const raw = document.getElementById("pasteArea").value;
      const parsed = raw.split(/\r?\n/).map(l => l.trim()).filter(Boolean).map(line => {
        const first = line.split(/[\t,;|]/)[0].replace(/^["']|["']$/g, "").trim();
        return first ? first.charAt(0).toUpperCase() + first.slice(1) : null;
      }).filter(Boolean);
      const p = document.getElementById("parsePrev");
      if (!parsed.length) { p.innerHTML = ""; return; }
      p.innerHTML = `<em>${parsed.length} item${parsed.length !== 1 ? "s" : ""} detected</em> ${parsed.slice(0, 6).join(" · ")}${parsed.length > 6 ? " …" : ""}`;
      updateCount();
    }

    function getActiveItems() {
      if (activeTab === "text") return items;
      return document.getElementById("pasteArea").value
        .split(/\r?\n/).map(l => l.trim()).filter(Boolean)
        .map(line => {
          const f = line.split(/[\t,;|]/)[0].replace(/^["']|["']$/g, "").trim();
          return f ? f.charAt(0).toUpperCase() + f.slice(1) : null;
        }).filter(Boolean);
    }

    function updateCount() {
      const n = getActiveItems().length;
      document.getElementById("countLabel").textContent = n ? `${n} item${n !== 1 ? "s" : ""} on list` : "No items yet";
      document.getElementById("compareBtn").disabled = n === 0;
      document.getElementById("clearBtn").style.display = n ? "" : "none";
    }

    function clearAll() {
      items = [];
      renderChips();
      document.getElementById("pasteArea").value = "";
      document.getElementById("parsePrev").innerHTML = "";
      document.getElementById("results").innerHTML = "";
      updateCount();
    }

    // ── Compare ───────────────────────────────────────────────────────────
    async function comparePrices() {
      const list = getActiveItems();
      if (!list.length) return;
      const btn = document.getElementById("compareBtn");
      btn.disabled = true; btn.textContent = "Comparing…";

      document.getElementById("results").innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <p>Fetching warehouse prices for ${list.length} item${list.length !== 1 ? "s" : ""}…</p>
        <p class="sub">Checking your local Costco #1450 and Sam's Club #8141</p>
      </div>`;

      try {
        const r = await fetch(`${API}/compare`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ items: list }),
        });
        if (!r.ok) {
          const txt = await r.text();
          let errMs = r.statusText;
          try { errMs = JSON.parse(txt).error || errMs; } catch (e) { errMs = txt.slice(0, 100); }
          throw new Error(errMs);
        }
        const d = await r.json();
        renderResults(d.results, d.summary, d.stores);
      } catch (err) {
        document.getElementById("results").innerHTML =
          `<div class="err"><strong>Error:</strong> ${err.message}</div>`;
      }

      btn.disabled = false; btn.textContent = "Compare prices →";
    }

    // ── Render ────────────────────────────────────────────────────────────
    const fmt = v => v != null ? "$" + (+v).toFixed(2) : null;

    function renderResults(rows, s, stores) {
      const wLabel = s.overall_winner === "costco" ? "Costco"
        : s.overall_winner === "samsclub" ? "Sam's Club"
          : null;
      const lLabel = s.overall_winner === "costco" ? "Sam's Club" : "Costco";

      let verdict = "";
      if (!wLabel || s.items_compared === 0) {
        verdict = "Not enough comparable items found — try more specific search terms.";
      } else {
        const wins = Math.max(s.costco_wins, s.samsclub_wins);
        const pct = Math.round((wins / s.items_compared) * 100);
        verdict = `<strong>${wLabel}</strong> is cheaper for your list, winning on ${wins} of ${s.items_compared} comparable items (${pct}%).`;
        if (s.total_savings > 0.01) verdict += ` Shopping at ${wLabel} saves approximately <strong>${fmt(s.total_savings)}</strong>.`;
        if (s.ties > 0) verdict += ` ${s.ties} item${s.ties > 1 ? "s" : ""} tied in price.`;
      }

      const tRows = rows.map(r => {
        const cp = r.costco_price, sp = r.samsclub_price;
        let pill = `<span class="pill pill-n">N/A</span>`, savCell = "—";
        if (cp != null && sp != null) {
          savCell = r.savings > 0.005 ? fmt(r.savings) : "—";
          if (r.winner === "costco") pill = `<span class="pill pill-c">Costco</span>`;
          else if (r.winner === "samsclub") pill = `<span class="pill pill-s">Sam's</span>`;
          else pill = `<span class="pill pill-t">Tie</span>`;
        }
        const cCell = cp != null
          ? `<span class="p-main">${fmt(cp)}</span>${r.costco_unit ? `<span class="p-sub">${r.costco_unit.slice(0, 50)}</span>` : ""}${r.costco_in_warehouse === false ? `<span class="p-sub" style="color:var(--amber)">online only</span>` : ""}`
          : `<span class="na-p">not found</span>`;
        const sCell = sp != null
          ? `<span class="p-main">${fmt(sp)}</span>${r.samsclub_unit ? `<span class="p-sub">${r.samsclub_unit.slice(0, 50)}</span>` : ""}`
          : `<span class="na-p">not found</span>`;
        return `<tr>
        <td class="col-item">${r.item}</td>
        <td class="col-store r">${cCell}</td>
        <td class="col-store r">${sCell}</td>
        <td class="col-saves r" style="color:var(--text2);font-size:13px">${savCell}</td>
        <td class="col-win c">${pill}</td>
      </tr>`;
      }).join("");

      const cN = rows.filter(r => r.costco_price != null).length;
      const sN = rows.filter(r => r.samsclub_price != null).length;

      document.getElementById("results").innerHTML = `
      <div class="summary-grid">
        <div class="metric">
          <div class="lbl">Costco total</div>
          <div class="val" style="color:var(--costco)">${cN > 0 ? fmt(s.costco_total) : "—"}</div>
          <div class="sub">Warehouse #${stores?.costco?.warehouse_id ?? ""} · ${cN} items</div>
        </div>
        <div class="metric">
          <div class="lbl">Sam's Club total</div>
          <div class="val" style="color:var(--sams)">${sN > 0 ? fmt(s.samsclub_total) : "—"}</div>
          <div class="sub">Club #${stores?.samsclub?.club_id ?? ""} · ${sN} items</div>
        </div>
        <div class="metric">
          <div class="lbl">Potential savings</div>
          <div class="val">${s.total_savings > 0.01 ? fmt(s.total_savings) : "—"}</div>
          <div class="sub">${wLabel ? "at " + wLabel : "—"}</div>
        </div>
      </div>
      <div class="tbl-wrap">
        <div class="tbl-head">
          <span>${rows.length} item${rows.length !== 1 ? "s" : ""} compared</span>
          <span class="data-tag tag-live">Live · warehouse prices</span>
        </div>
        <table>
          <thead><tr>
            <th class="col-item">Item</th>
            <th class="col-store r">Costco #${stores?.costco?.warehouse_id ?? ""}</th>
            <th class="col-store r">Sam's #${stores?.samsclub?.club_id ?? ""}</th>
            <th class="col-saves r">Saves</th>
            <th class="col-win c">Winner</th>
          </tr></thead>
          <tbody>${tRows}</tbody>
        </table>
      </div>
      <div class="verdict"><div class="v-lbl">Recommendation</div><div class="v-txt">${verdict}</div></div>`;
    }

    checkBackend();
    setInterval(checkBackend, 60000);
  </script>
</body>

</html>
